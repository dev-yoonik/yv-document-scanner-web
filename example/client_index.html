<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youverse Document Scan</title>
  <script src="../js/dist/youverse-document-scan.min.js"></script>

  <style>
    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <youverse-document-scan id="youverse" locale="en" license="Your.Jwt.License"></youverse-document-scan>
</body>

<script>
  const EVENT_TYPES = {
    NEXT_STEP: "YV_DOCUMENT_NEXT_STEP",
    RESPONSE_NEXT_STEP: "YV_DOCUMENT_RESPONSE_NEXT_STEP",
    CANCEL: "YV_DOCUMENT_CANCEL",
    RESPONSE_CANCEL: "YV_DOCUMENT_RESPONSE_CANCEL",
  };

  function createResponseEvent(responseMessage, eventType) {
    return new CustomEvent(eventType, {
      detail: responseMessage,
    });
  }

  document.addEventListener(EVENT_TYPES.NEXT_STEP, function (event) {
    const { image } = event.detail;

    //Interact with a web component
    setTimeout(() => {
      document.dispatchEvent(
        new CustomEvent(EVENT_TYPES.RESPONSE_NEXT_STEP)
      );
    }, 5000);

  });

  document.addEventListener(EVENT_TYPES.CANCEL, function (event) {
    console.log("Canceled");

    //Interact with a web component
    document.dispatchEvent(
      new CustomEvent(EVENT_TYPES.RESPONSE_CANCEL)
    );
  });
</script>

</html>
